<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <title>RTS Timer</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="app">
    <h1>RTS Timer</h1>
    <p class="subtitle">Peons • Scout • Armée • Ressources • Défense</p>

    <form id="addReminderForm" class="add-reminder">
      <input
        id="reminderName"
        type="text"
        placeholder="Nom du rappel"
        maxlength="40"
        required
      />
      <input
        id="reminderTime"
        type="number"
        value="30"
        min="5"
        aria-label="Temps en secondes"
        required
      />
      <input
        id="reminderAudio"
        type="file"
        accept="audio/*"
        aria-label="Fichier audio du rappel"
        required
      />
      <button type="submit">Ajouter</button>
    </form>

    <section id="reminders" class="reminders">
      <label class="reminder" data-sound="peon">
        <input
          class="reminder-toggle"
          type="checkbox"
          aria-label="Activer Peons"
          checked
        />
        <span>Peons</span>
        <input id="peon" type="number" value="10" min="5" />
        <small>secondes</small>
      </label>

      <label class="reminder" data-sound="scout">
        <input
          class="reminder-toggle"
          type="checkbox"
          aria-label="Activer Scout"
          checked
        />
        <span>Scout</span>
        <input id="scout" type="number" value="15" min="5" />
        <small>secondes</small>
      </label>

      <label class="reminder" data-sound="army">
        <input
          class="reminder-toggle"
          type="checkbox"
          aria-label="Activer Armée"
          checked
        />
        <span>Armée</span>
        <input id="army" type="number" value="18" min="5" />
        <small>secondes</small>
      </label>

      <label class="reminder" data-sound="resources">
        <input
          class="reminder-toggle"
          type="checkbox"
          aria-label="Activer Ressources"
          checked
        />
        <span>Ressources</span>
        <input id="resources" type="number" value="20" min="5" />
        <small>secondes</small>
      </label>

      <label class="reminder" data-sound="defense">
        <input
          class="reminder-toggle"
          type="checkbox"
          aria-label="Activer Défense"
          checked
        />
        <span>Défense</span>
        <input id="defense" type="number" value="25" min="5" />
        <small>secondes</small>
      </label>
    </section>

    <section class="controls">
      <button id="startBtn">Start</button>
      <button id="stopBtn">Stop</button>
    </section>

    <p id="status">Timer arrêté</p>
  </main>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
